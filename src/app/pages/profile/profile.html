<div class="profile-container">

  <!-- World Tabs -->
  <div class="world-tabs">
    <button
      *ngFor="let w of gameState.getUnlockedWorlds()"
      [class.active]="w === selectedWorld"
      (click)="selectWorld(w)">
      {{ w | titlecase }}
    </button>
  </div>

  <!-- Completion Bar -->
  <div class="completion-container" *ngIf="currentPlayer">
    <div class="completion-bar">
      <div
        class="completion-fill"
        [style.width.%]="completionPercent">
      </div>
    </div>
    <div class="completion-text">{{ completionPercent }}%</div>
  </div>

  <!-- Spinner List -->
  <div class="spinner-list" *ngIf="currentPlayer">
    <div class="spinner-item" *ngFor="let sp of currentPlayer.spinners">
      <span>{{ sp.name | titlecase }}</span>
      <span>{{ sp.amount }}</span>
    </div>
  </div>

  <!-- Total unlocked spinners -->
  <div class="spinner-summary" *ngIf="currentPlayer">
    Total unlocked: {{ spinnerCountText }}
  </div>

</div>
