<div class="app-container" [class.animations-disabled]="!settings.animationsEnabled">
  <!-- Navbar always visible -->
  <app-navbar class="navbar"></app-navbar>

  <div class="main-area">
    <main class="world-area">
      <router-outlet></router-outlet>
      <app-offline-modal></app-offline-modal>
    </main>

    <aside class="sidebar">
      <app-sidebar></app-sidebar>
    </aside>
  </div>

  <div class="credits-modal" *ngIf="isCreditsOpen" [class.closing]="isClosing">
    <button class="close-btn" (click)="closeCredits()">✕</button>

    <div class="content">
      <p>
        Loaders from
        <a href="https://css-loaders.com/" target="_blank" class="firstP"> css-loaders.com </a>
      </p>

      <p>
        Created by
        <a href="https://github.com/Afif13/" target="_blank" class="secondP"> Temani Afif </a>
      </p>
    </div>
  </div>
</div>
